name: cas-ui

x-app-env: &app-env
  MEMBER1_API_BASE_URL: ${MEMBER1_API_BASE_URL:-http://host.docker.internal:8002}
  MEMBER2_API_BASE_URL: ${MEMBER2_API_BASE_URL:-http://host.docker.internal:8000}
  MEMBER3_API_BASE_URL: ${MEMBER3_API_BASE_URL:-http://host.docker.internal:8001}
  MEMBER4_API_BASE_URL: ${MEMBER4_API_BASE_URL:-http://host.docker.internal:8003}
  SUPPORT_BACKEND_BASE_URL: ${SUPPORT_BACKEND_BASE_URL:-http://host.docker.internal:5000}
  VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://host.docker.internal:5000}

x-app-base: &app-base
  image: node:20-bookworm-slim
  working_dir: /app
  init: true
  env_file:
    - .env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - .:/app
    - node_modules:/app/node_modules
    - npm_cache:/root/.npm
  environment: *app-env

services:
  app:
    <<: *app-base
    environment:
      <<: *app-env
      NODE_ENV: development
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

  preview:
    <<: *app-base
    profiles:
      - preview
    environment:
      <<: *app-env
      NODE_ENV: production
    command: sh -c "npm ci && npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    ports:
      - "4173:4173"

volumes:
  node_modules:
  npm_cache:
